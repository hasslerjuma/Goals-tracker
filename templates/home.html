{% extends 'base.html' %}
{% block content %}
<h2>My goals</h2>

{%  if goals %}
    {% for goal in goals %}
        <div class="goal">
            <strong>{{ goal.name }}</strong> - {{ goal.category }}
            <a href="/edit/{{ goal.id }}">Edit</a>
            <a href="/delete/{{ goal.id }}">Delete</a>
        </div>
    {% endfor %}
{% else %}
    <p>No goals set yet. Start by adding one!</p>
{% endif %}
{% endblock %}
